<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>GameRating</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <div class="logo">GameRating</div>

        <nav class="nav">
            <a href="index.html">home</a>
            <a href="contacts.html">about us</a>
            <a href="contacts.html">contacts</a>
            <a href="contacts.html">support</a>
        </nav>
    </header>


    <section class="games">

        <h2>Popular games,that every teenager plays</h2>

        <div class="cards">

            <div class="card" id="minacraft">
                <img src="img/minacraft.png" alt="minecraft">
                <p>
                    Безмежний кубічний світ, де можна будувати,
                    виживати і творити.
                </p>
                <div class="stars">★★★★★</div>
            </div>

            <div class="card" id="mafia">
                <img src="img/mafia.png" alt="mafia">
                <p>
                    Кримінальний світ мафії,
                    де кожен вибір має ціну
                </p>
                <div class="stars">★★★★★</div>
            </div>

            <div class="card" id="gta">
                <img src="img/gta.png" alt="gta">
                <p>
                    Відкритий кримінальний світ,
                    де свобода і хаос йдуть поруч
                </p>
                <div class="stars">★★★★★</div>
            </div>

        </div>

    </section>
<script src="script.js"></script>
</body>

</html>
